# Site settings
title: PermissionsExPlus
email: rowan-smith@users.noreply.github.com
description: >
  Permissions plugin for Minecraft servers. Manage users, groups, permissions,
  prefixes, and multi-world setups with familiar /pex commands.
baseurl: ""
url: "https://example.rono.dev"
github_username: rowan-smith
repo: rowan-smith/PermissionsExPlus
version: "1.23.5"

# Build settings
